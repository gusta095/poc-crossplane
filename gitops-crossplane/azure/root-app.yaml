apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: azure-root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: azure
  source:
    repoURL: https://github.com/gusta-lab/gitops-crossplane
    targetRevision: main
    path: azure/templates
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
