apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: azure-environments
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: azure
  source:
    repoURL: https://github.com/gusta-lab/azure-crossplane
    targetRevision: main
    path: environments
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
